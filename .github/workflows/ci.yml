# Gork Build CI — lint, privacy tests, and the community `gork` binary.
#
# Layout mirrors a normal Rust project CI (see thedavidweng/sdf-flash-gui):
#   fmt → clippy → tests/build
# Scoped for this monorepo: full-workspace clippy -D warnings is not practical
# on the upstream snapshot; clippy covers privacy-critical crates + the pager
# binary surface. Privacy unit tests stay a separate fast job.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # Pin matches rust-toolchain.toml (manual bumps only).
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler pkg-config libssl-dev cmake libclang-dev \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-targets: "true"

      - name: Clippy privacy-critical crates
        # --no-deps: lint only these packages, not the full monorepo graph
        # (upstream crates still carry clippy noise). -D warnings on our
        # privacy surface.
        run: |
          cargo clippy --no-deps \
            -p xai-grok-version \
            -p xai-mixpanel \
            -p xai-grok-telemetry \
            -p xai-grok-update \
            --lib \
            -- -D warnings

      - name: Clippy gork binary crate
        # Thin entry crate for the community CLI; --no-deps keeps the job
        # from re-linting the whole pager dependency tree.
        run: |
          cargo clippy --no-deps \
            -p xai-grok-pager-bin \
            --bins \
            -- -D warnings

  # ── Tests ─────────────────────────────────────────────────────────────────
  test-privacy:
    name: Privacy tests
    runs-on: ubuntu-latest
    # Full update suite + feature-enabled installer tests can be slow.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler pkg-config libssl-dev cmake libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: privacy-tests
          cache-targets: "true"

      - name: Test privacy-critical crates
        run: |
          # Crates that compile cleanly as lib tests in the open-source
          # snapshot. Full xai-grok-shell --lib currently fails upstream
          # (missing test helpers / partial monorepo cut) — so we filter to
          # privacy resolver tests that do compile when the crate builds.
          cargo test -p xai-grok-version --lib
          cargo test -p xai-mixpanel --lib
          cargo test -p xai-grok-telemetry --lib default_is_privacy
          # Default product build: full update crate suite (lib + integration
          # tests that do NOT require installer mocks). Installer-mechanic
          # tests are behind `updater-integration-tests` and compile empty
          # without the feature.
          cargo test -p xai-grok-update
          # Focused privacy filters (also covered above; keep for clarity).
          cargo test -p xai-grok-update --lib privacy -- --nocapture
          cargo test -p xai-grok-update --lib env_cannot_disable -- --nocapture
          # Installer mechanics against local mocks (feature + env required).
          # IMPORTANT: cargo's `--tests` also runs library unit tests. With the
          # feature compiled in and GORK_TEST_ALLOW_UPDATE=1 in the process
          # env, privacy unit tests that assert "gate stays on" would fail.
          # Target only the installer integration test binaries by name.
          GORK_TEST_ALLOW_UPDATE=1 cargo test -p xai-grok-update \
            --features updater-integration-tests \
            --test test_install_internal \
            --test test_blitz_cancel \
            --test test_check_status_regression \
            --test test_concurrent_convergence \
            --test test_downgrade_matrix
          # Telemetry / trace resolvers: env/config/remote cannot re-enable.
          cargo test -p xai-grok-shell --test privacy_resolvers -- --nocapture

      - name: Static install chokepoint inventory
        run: |
          set -euo pipefail
          # Product install entry must gate on vendor_auto_update_forbidden.
          grep -n 'vendor_auto_update_forbidden' \
            crates/codegen/xai-grok-update/src/auto_update.rs \
            crates/codegen/xai-grok-update/src/minimum_version.rs
          # run_install_script must contain the privacy early return.
          grep -n 'if vendor_auto_update_forbidden' \
            crates/codegen/xai-grok-update/src/auto_update.rs
          # Default internal bases must still be the vendor CDN (so the gate
          # is what blocks them — not a silent empty list).
          grep -n 'https://x.ai/cli' crates/codegen/xai-grok-update/src/version.rs

  # Optional supply-chain scan (advisory DB; non-blocking until the fork
  # pins deny.toml / allowlists for the full monorepo graph).
  cargo-audit:
    name: cargo audit (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit 2>&1 | tee cargo-audit.log || true
      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-audit-log
          path: cargo-audit.log
          if-no-files-found: ignore
          retention-days: 14

  # ── Build ─────────────────────────────────────────────────────────────────
  build-gork:
    name: Build gork
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler pkg-config libssl-dev cmake libclang-dev \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-gork
          cache-targets: "true"

      - name: Build gork (release)
        run: cargo build -p xai-grok-pager-bin --release

      - name: Smoke gork CLI
        run: |
          set -euo pipefail
          BIN=target/release/gork
          test -x "$BIN"
          "$BIN" --version
          HELP=$("$BIN" --help)
          echo "$HELP" | head -20
          echo "$HELP" | grep -q 'Gork Build TUI'
          echo "$HELP" | grep -q 'Usage: gork'
          # argv0 mapping: binary named gork must not be forced back to grok
          echo "smoke ok"

      - name: Upload gork binary
        uses: actions/upload-artifact@v7
        with:
          name: gork-linux-x86_64
          path: target/release/gork
          if-no-files-found: error
          retention-days: 14

  # Release-binary network capture: CONNECT proxy logs destinations; fail if
  # denylisted privacy/vendor hosts appear (no MITM required).
  privacy-egress:
    name: Privacy egress capture
    needs: [build-gork]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Download gork binary
        uses: actions/download-artifact@v7
        with:
          name: gork-linux-x86_64
          path: target/release

      - name: Run privacy egress check
        run: |
          set -euo pipefail
          chmod +x target/release/gork scripts/privacy_egress_check.sh
          export PRIVACY_EGRESS_WORKDIR="${RUNNER_TEMP}/gork-privacy-egress"
          mkdir -p "$PRIVACY_EGRESS_WORKDIR"
          GORK_BIN=target/release/gork ./scripts/privacy_egress_check.sh

      - name: Upload egress host log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: privacy-egress-hosts
          path: ${{ runner.temp }}/gork-privacy-egress/**
          if-no-files-found: ignore
          retention-days: 14
